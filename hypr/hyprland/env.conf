# ############ Wayland #############
env = ELECTRON_OZONE_PLATFORM_HINT,auto

######### Applications #########
env = XDG_DATA_DIRS,$HOME/.local/share/flatpak/exports/share:/var/lib/flatpak/exports/share:/usr/local/share:/usr/share:$XDG_DATA_DIRS

# ############ Themes #############
env = QT_QPA_PLATFORM, wayland;xcb
env = QT_QPA_PLATFORMTHEME, kde
env = XDG_MENU_PREFIX, plasma-

# ######## Virtual envrionment #########
env = ILLOGICAL_IMPULSE_VIRTUAL_ENV, ~/.local/state/quickshell/.venv

# ######## Terminal application #########
env = TERMINAL,kitty

# Sonradan eklenenler (bozukluk olursa sil)
# İmleç takılmalarını bitirmek için (Hibrit sistemlerde hayat kurtarır)
env = WLR_NO_HARDWARE_CURSORS,1
env = LIBVA_DRIVER_NAME,nvidia
env = __GLX_VENDOR_LIBRARY_NAME,nvidia
env = GBM_BACKEND,nvidia-drm

# Hyprland'in AMD iGPU üzerinde çalışmasını zorla (Akıcılık için)
# Bu sayede masaüstü AMD'de yağ gibi akar, oyunlarda Nvidia devreye girer.
env = WLR_DRM_DEVICES,/dev/dri/card2:/dev/dri/card1
